services:
  rabbitmq:
    image: rabbitmq:4.2.5-management
    container_name: rabbitmq
    hostname: rabbitmq_node
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: admin 
      RABBITMQ_DEFAULT_PASS: passwd    
      

  python-pika:
    image: kwonghung/python-pika:latest
    container_name: python-pika
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # disable print buffer to so the log
      PYTHONUNBUFFERED: 1
    depends_on:
      - rabbitmq