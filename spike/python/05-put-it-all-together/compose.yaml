services:

  postgres:
    image: postgres:${POSTGRES_VERSION:-18.4}
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=passwd
      - POSTGRES_DB=db1
    volumes:
      - ./resources/postgres/init-db:/docker-entrypoint-initdb.d:ro

  adminer:
    image: adminer:${ADMINER_VERSION:-5.4.2}
    container_name: adminer
    ports:
      - 8081:8080
    links:
      - postgres:db
    depends_on:
      - postgres

  rabbitmq:
    image: rabbitmq:4.3.0-management
    container_name: rabbitmq
    hostname: rabbitmq_node
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: admin 
      RABBITMQ_DEFAULT_PASS: passwd
    #  RABBITMQ_CONFIG_FILE: /etc/rabbitmq/rabbitmq.conf
    #volumes:
      #- ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      #- ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
      #- ./rabbitmq/init-setup.sh:/etc/rabbitmq/init-setup.sh
    # container status: starting => healthy (first health check success) => unhealthy
    # https://docs.docker.com/reference/compose-file/services/#healthcheck
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      start_period: 10s
      start_interval: 5s
      interval: 10s
      timeout: 5s
      retries: 3

  python-app:
    container_name: python-app

    build:
      context: .
      dockerfile: Dockerfile
      args:
        - MAIN_FILE=main.py
    
    environment:
      UV_NO_DEV: 0
      UV_NO_ENV_FILE: true
      RABBITMQ_HOST: rabbitmq
      POSTGRES_HOST: postgres
      MOCK_LLM_CALLS: true
    
    secrets:
      - google-api-key

    # https://docs.docker.com/compose/how-tos/file-watch/
    # https://docs.docker.com/reference/compose-file/develop/
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app
          include:
            - "*.py"
          ignore:
            - .venv/
          initial_sync: true

        - action: rebuild
          path: uv.lock

    depends_on:
      rabbitmq:
        # condition: service_started
        condition: service_healthy
        # condition: service_completed_successfully

secrets:
  google-api-key:
    file: ./.google-api-key