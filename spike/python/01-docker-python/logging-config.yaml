version: 1
disable_existing_loggers: false

formatters:
  common:
    format: "%(asctime)s [%(levelname)s]|%(threadName)s|%(funcName)s : %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: common
    stream: ext://sys.stdout

loggers:
  __main__:
    level: DEBUG
    propagate: false
    handlers:
      - console

root:
  level: INFO
  handlers:
    - console